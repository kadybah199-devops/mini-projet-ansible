---
# YAML documents begin with the document separator ---

# The minus in YAML this indicates a list item.  The playbook contains a list
# of plays, with each play being a dictionary
-

  # Hosts: where our play will run and options it will run with
  hosts: prod
  become: true
  # Vars: variables that will apply to the play, on all target systems
  vars_files:
    - vars/logos.yaml

  # Tasks: the list of tasks that will be executed within the play, this section
  # can also be used for pre and post tasks
  tasks:

    - name: Définir la variable nginx_root_location en fonction de la distribution
      set_fact:
        nginx_root_location: "/usr/share/nginx/html"
      when: ansible_os_family == "RedHat"

    - name: Définir la variable nginx_root_location pour Ubuntu
      set_fact:
        nginx_root_location: "/var/www/html"
      when: ansible_os_family == "Debian"
  
    - name: Install EPEL
      yum:
        name: epel-release
        update_cache: yes
        state: latest
      when: ansible_distribution == 'CentOS'

    - name: Kill any existing Nginx process
      shell: pkill -f nginx; exit 0
      args:
          executable: /bin/bash

    - name: Install Nginx
      package:
        name: nginx
        state: latest

    - name: Start Nginx
      shell: "nohup /usr/sbin/nginx > /dev/null 2>&1 &"
      ignore_errors: yes

    - name: Wait for Nginx to start
      pause:
        seconds: 2

    - name: Verify Nginx is running
      shell: "pgrep -f 'nginx: master' > /dev/null && echo 'Nginx running' || echo 'Nginx NOT running'"
      register: nginx_status
      changed_when: false

    - name: Display Nginx status
      debug:
        msg: "{{ nginx_status.stdout }}"

    - name: Template index.html-easter_egg.j2 to index.html on target
      template:
        src: index.html-easter_egg.j2
        dest: "{{ nginx_root_location }}/index.html"
        mode: 0644
      notify: Check HTTP Service

    - name: Install unzip
      package:
        name: unzip
        state: latest

    - name: Unarchive playbook stacker game
      unarchive:
        src: playbook_stacker.zip
        dest: "{{ nginx_root_location }}"
        mode: 0755

  # Handlers: the list of handlers that are executed as a notify key from a task
  handlers:
    - name: Check HTTP Service
      uri:
        url: http://localhost
        status_code: 200 

# Three dots indicate the end of a YAML document
...
