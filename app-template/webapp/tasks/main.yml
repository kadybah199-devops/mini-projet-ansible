---
# Task file for webapp - Deploy containerized application with Docker

- name: Pull Docker image
  shell: "docker pull {{ docker_image }}:{{ docker_image_tag }}"
  tags:
    - pull-webapp-image

- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: '0755'
  tags:
    - create-app-dir

- name: Copy application files
  copy:
    src: "files/"
    dest: "{{ app_dir }}/"
    mode: '0644'
  when: app_files_dir is defined
  tags:
    - copy-app-files

- name: Generate index.html from template
  template:
    src: "{{ template_index }}"
    dest: "{{ app_dir }}/index.html"
    mode: '0644'
  tags:
    - template-index

- name: Stop existing webapp container
  shell: "docker stop {{ container_name }} || echo 'Container not running'"
  changed_when: false
  tags:
    - stop-webapp-container

- name: Remove existing webapp container
  shell: "docker rm {{ container_name }} || echo 'Container does not exist'"
  changed_when: false
  tags:
    - remove-webapp-container

- name: Run Docker container for webapp
  shell: "docker run -d --name {{ container_name }} -p {{ app_port }}:80 --network {{ docker_network }} -v {{ app_dir }}/index.html:/usr/share/nginx/html/index.html:ro --restart unless-stopped {{ docker_image }}:{{ docker_image_tag }}"
  tags:
    - run-webapp-container
    - run-webapp-container

- name: Ensure webapp container is running
  docker_container:
    name: "{{ container_name }}"
    state: started
  tags:
    - ensure-webapp-running

- name: Wait for webapp to be ready
  wait_for:
    host: localhost
    port: "{{ app_port }}"
    delay: 2
    timeout: 30
  tags:
    - wait-webapp
